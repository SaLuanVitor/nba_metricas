name: Health Checks

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  overall-health:
    name: Overall Health
    runs-on: ubuntu-latest
    steps:
      - name: Check overall health
        run: |
          response=$(curl -fsS https://api.nba_metricas.com/api/health)
          echo "$response" | jq '.'

          status=$(echo "$response" | jq -r '.status')
          if [ "$status" != "healthy" ]; then
            echo "System is not healthy!"
            exit 1
          fi

          missing=$(echo "$response" | jq -r '.missingRequiredEnv | length')
          if [ "$missing" != "0" ]; then
            echo "Missing required env vars detected"
            exit 1
          fi

  alert-on-failure:
    name: Alert on Failure
    runs-on: ubuntu-latest
    needs: [overall-health]
    if: always() && needs.overall-health.result != 'success'
    steps:
      - name: Send alert
        run: |
          echo "Health check failed. Configure Slack/PagerDuty webhook here."
