services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - USE_MOCK_DATA=${USE_MOCK_DATA:-false}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nba_metricas
      - NBA_STATS_BASE_URL=${NBA_STATS_BASE_URL:-https://stats.nba.com/stats}
      - NBA_STATS_USER_AGENT=${NBA_STATS_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36}
      - NBA_STATS_REFERER=${NBA_STATS_REFERER:-https://www.nba.com/}
      - NBA_STATS_TIMEOUT_MS=${NBA_STATS_TIMEOUT_MS:-10000}
      - BALLDONTLIE_API_KEY=${BALLDONTLIE_API_KEY:-}
      - BOLTODDS_API_KEY=${BOLTODDS_API_KEY:-}
      - STATUS_CONFIDENCE_MIN_SAFE=${STATUS_CONFIDENCE_MIN_SAFE:-70}
      - STATUS_CONFIDENCE_TARGET=${STATUS_CONFIDENCE_TARGET:-80}
      - REDIS_URL=redis://redis-cache:6379
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nba_metricas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # pgAdmin (PostgreSQL GUI)
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@nba-metricas.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
